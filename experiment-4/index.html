<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Result Calculator</h1>
        <form id="resultForm">
            <label for="subjects">Number of Subjects:</label>
            <input type="number" id="subjects" name="subjects" min="1" required><br><br>
            <button type="button" onclick="submitForm()" >Calculate Result</button>
        </form>

        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
